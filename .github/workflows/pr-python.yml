name: PR Python Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  python-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python installation
        run: python --version
